[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#b36d43}FREE%{F-} %free%

label-mounted-foreground = ${colors.foreground}
format-mounted-prefix-foregroud = ${colors.foreground}

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/cpu]
type = internal/cpu
interval = 2
label-foreground = ${colors.foreground}
label = "%{F#b36d43}CPU%{F-} %percentage:1%%"

[module/memory]
type = custom/script
exec = free -m | awk '/Mem:/{printf "%.1f %.0f", ($2-$4-$6)/1024, $2/1000} /Swap:/ {printf " %.1f", $3/1024}' | awk '{if ($3 > 0.1) printf "%s GiB", $1,$3,$2; else printf "%s GB", $1,$2}'
label-foreground = ${colors.foreground}
interval = 2
click-left = pgrep htop && killall htop || st -e htop
label =  %{F#b36d43}RAM%{F-} %output:2%

[bar/workspaces]
width = 40%
height = 20pt
radius = 6
bottom = false
offset-x = 1%
offset-y = 3pt
wm-restack = i3
override-redirect = true
background = ${colors.background-alt}
foreground = ${colors.background}
line-size = 2pt
border-color = ${colors.background}
padding-left = 2
padding-right = 2
module-margin = 1
font-0 = "JetBrains Mono:size=8;2"
fixed-center = true
modules-left = xworkspaces systray
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
